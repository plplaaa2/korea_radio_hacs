# Describes the format for available Play Radio services
play_radio:
  description: Play a radio channel on selected media players.
  fields:
    entity_id:
      description: Name(s) of media player entities.
      example: "media_player.living_room_speaker"
      selector:
        entity:
          domain: media_player
          multiple: true
    channel:
      description: Select radio channel from the list.
      example: "kbs_cool"
      selector:
        select:
          options:
            - label: "KBS Cool FM (89.1)"
              value: "kbs_cool"
            - label: "KBS Happy FM (106.1)"
              value: "kbs_happy"
            - label: "KBS Classic FM (93.1)"
              value: "kbs_classic"
            - label: "KBS 1 Radio (97.3)"
              value: "kbs_1radio"
            - label: "KBS 3 Radio (104.9)"
              value: "kbs_3radio"
            - label: "MBC FM4U (91.9)"
              value: "mbc_fm4u"
            - label: "MBC Standard FM (95.9)"
              value: "mbc_fm"
            - label: "SBS Power FM (107.7)"
              value: "sbs_power"
            - label: "SBS Love FM (103.5)"
              value: "sbs_love"
            - label: "CBS Music FM (93.9)"
              value: "cbs_music"
            - label: "CBS Standard FM (98.1)"
              value: "cbs_fm"
            - label: "YTN Radio (94.5)"
              value: "ytn"
            - label: "TBS FM (95.1)"
              value: "tbs"
            - label: "TBN Radio (100.5)"
              value: "tbn"
            - label: "iFM (90.7)"
              value: "ifm"
            - label: "KFN Radio (96.1)"
              value: "kfn"
            - label: "OBS Radio (99.9)"
              value: "obs"
            - label: "WBS Radio (89.7)"
              value: "wbs"
            - label: "EBS FM (104.5)"
              value: "ebs"
          custom_value: true
